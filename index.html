<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪玄 · 云岿山门主 | 绝区零角色助手</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景层 -->
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>
    <div class="scan-line"></div>

    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">玄</div>
                <div>
                    <div class="logo-text glitch">YIXUAN</div>
                    <div class="logo-subtitle">云岿山第十三代门主</div>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>系统在线</span>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 对话区域 -->
            <section class="chat-section">
                <!-- 角色信息栏 -->
                <div class="char-bar">
                    <div class="char-avatar">玄</div>
                    <div class="char-info">
                        <h2>仪玄</h2>
                        <p>虚狩级调查员 · 玄墨属性 · 命破特性</p>
                    </div>
                </div>

                <!-- 消息区 -->
                <div class="chat-messages" id="messages">
                    <!-- 消息会动态添加 -->
                </div>

                <!-- 输入区 -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea 
                            class="chat-input" 
                            id="chatInput"
                            placeholder="问为师何事？"
                            rows="1"></textarea>
                        <button class="send-btn" id="sendBtn">
                            发送
                        </button>
                    </div>
                </div>
            </section>

            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- 角色信息 -->
                <div class="sidebar-card">
                    <h3>◈ 角色档案</h3>
                    <div class="char-stats">
                        <div class="stat-item">
                            <div class="stat-label">阵营</div>
                            <div class="stat-value">云岿山</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">属性</div>
                            <div class="stat-value">玄墨</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特性</div>
                            <div class="stat-value">命破</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">生日</div>
                            <div class="stat-value">12月3日</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">身高</div>
                            <div class="stat-value">172cm</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">CV</div>
                            <div class="stat-value">张昱</div>
                        </div>
                    </div>
                </div>

                <!-- 设置 -->
                <div class="sidebar-card">
                    <h3>◈ 功能设置</h3>
                    <div class="setting-item">
                        <span class="setting-label">RAG 检索</span>
                        <div class="toggle active" id="ragToggle"></div>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">回答校验</span>
                        <div class="toggle active" id="validationToggle"></div>
                    </div>
                </div>

                <!-- 快捷问题 -->
                <div class="sidebar-card">
                    <h3>◈ 快捷提问</h3>
                    <div class="quick-questions">
                        <button class="quick-question">你是谁？</button>
                        <button class="quick-question">师父，既入山门，该当如何？</button>
                        <button class="quick-question">如何修习术法？</button>
                        <button class="quick-question">仪玄的姐姐是谁？</button>
                        <button class="quick-question">什么是动静之道？</button>
                        <button class="quick-question">师父，我工作压力大怎么办？</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
