<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪玄 · 云岿山门主 | 绝区零角色助手</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景层 -->
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">玄</div>
                <div>
                    <div class="logo-text">YIXUAN</div>
                    <div class="logo-subtitle">云岿山第十三代门主</div>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>系统在线</span>
            </div>
        </header>

        <!-- 主内容 - 左中右三栏 -->
        <main class="main-content">
            <!-- 左侧 - 角色立绘 -->
            <aside class="sidebar-left">
                <div class="char-portrait">
                    <img src="assets/zzz_bg_01.jpg" alt="仪玄">
                    <div class="char-name">
                        <h2>仪玄</h2>
                        <p>云岿山 · 第十三代门主</p>
                    </div>
                </div>
            </aside>

            <!-- 中间 - 聊天区 -->
            <section class="chat-section">
                <div class="chat-header">
                    <h3>◈ 对话 · DIALOGUE</h3>
                </div>
                <div class="chat-messages" id="messages">
                    <div class="message bot">
                        <div class="message-avatar bot">玄</div>
                        <div class="message-content">既入山门，那些俗务繁礼便留在山下吧。为师仪玄，云岿山第十三代门主。你且说来，所为何事？</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="chatInput" placeholder="向仪玄提问..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn">发送</button>
                    </div>
                </div>
            </section>

            <!-- 右侧 - 功能面板 -->
            <aside class="sidebar-right">
                <!-- 角色档案 -->
                <div class="sidebar-card">
                    <h3>◈ 角色档案</h3>
                    <div class="char-stats">
                        <div class="stat-item">
                            <div class="stat-label">阵营</div>
                            <div class="stat-value">云岿山</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">属性</div>
                            <div class="stat-value">玄墨</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特性</div>
                            <div class="stat-value">命破</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">生日</div>
                            <div class="stat-value">12月3日</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">身高</div>
                            <div class="stat-value">172cm</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">CV</div>
                            <div class="stat-value">张昱</div>
                        </div>
                    </div>
                </div>

                <!-- 设置 -->
                <div class="sidebar-card">
                    <h3>◈ 功能设置</h3>
                    <div class="setting-item">
                        <span class="setting-label">RAG 检索</span>
                        <div class="toggle active" id="ragToggle"></div>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">回答校验</span>
                        <div class="toggle active" id="validationToggle"></div>
                    </div>
                </div>

                <!-- 快捷问题 -->
                <div class="sidebar-card">
                    <h3>◈ 快捷提问</h3>
                    <div class="quick-questions">
                        <button class="quick-question">你是谁？</button>
                        <button class="quick-question">师父，既入山门，该当如何？</button>
                        <button class="quick-question">如何修习术法？</button>
                        <button class="quick-question">仪玄的姐姐是谁？</button>
                        <button class="quick-question">什么是动静之道？</button>
                        <button class="quick-question">师父，我工作压力大怎么办？</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
